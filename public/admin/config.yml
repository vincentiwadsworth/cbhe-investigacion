backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: cursos
    label: Cursos
    label_singular: Curso
    folder: src/content/cursos
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Título, widget: string }
      - {
          name: category,
          label: Categoría,
          widget: select,
          options: ["Técnico", "Legal", "Tecnológico", "Ambiental"],
        }
      - {
          name: modality,
          label: Modalidad,
          widget: select,
          options: ["Virtual", "Presencial", "Híbrido"],
        }
      - { name: image, label: Imagen, widget: image }
      - { name: startDate, label: Fecha de inicio, widget: string }
      - { name: hours, label: Horas académicas, widget: string }
      - {
          name: description,
          label: Descripción breve,
          widget: text,
          required: false,
        }
      - { name: body, label: Contenido completo, widget: markdown }
      - {
          name: draft,
          label: Borrador,
          widget: boolean,
          default: false,
          required: false,
        }

  - name: articulos
    label: Artículos
    label_singular: Artículo
    folder: src/content/articulos
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Título, widget: string }
      - {
          name: category,
          label: Categoría,
          widget: select,
          options:
            [
              "Análisis Sectorial",
              "Institucional",
              "Energías Alternativas",
              "Regulación",
              "Capacitación",
            ],
        }
      - { name: excerpt, label: Extracto, widget: text }
      - { name: date, label: Fecha, widget: string }
      - {
          name: image,
          label: Imagen,
          widget: image,
          required: false,
        }
      - {
          name: featured,
          label: Destacado en portada,
          widget: boolean,
          default: false,
          required: false,
        }
      - { name: body, label: Contenido completo, widget: markdown }
      - {
          name: draft,
          label: Borrador,
          widget: boolean,
          default: false,
          required: false,
        }
